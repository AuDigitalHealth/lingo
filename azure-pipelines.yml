name: snomio-$(Date:yyyyMMdd)$(Rev:.r)_$(Build.SourceBranchName)

trigger:
  branches:
    include:
      - main
  tags:
    include:
      - '*'

variables:
  mavenCache: $(Pipeline.Workspace)/.m2/repository
  mavenOptions: '-Dmaven.repo.local=$(mavenCache) -Dmaven.settings.security=never'
  isRelease:  $[eq(startsWith(variables['Build.SourceBranch'], 'refs/tags/'), true)]
  feedName: 'snomio'

resources:
  repositories:
    - repository: sergio
      type: github
      name: aehrc/sergio
      endpoint: aehrc
      ref: rabbit-snomio-image-as-cli-entity-refactor

pool:
  vmImage: ubuntu-latest

jobs:
  - job: secrets_scan
    displayName: "Secret scan (TruffleHog + Gitleaks)"
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self
        fetchDepth: 0   # full history for scanners

      # TruffleHog (full history) — fails on findings
      - task: UsePythonVersion@0
        displayName: "Use Python (for TruffleHog)"
        inputs:
          versionSpec: "3.x"

      - script: |
          set -euo pipefail
          TH_VERSION="3.78.0"
          echo "Installing TruffleHog v${TH_VERSION}…"
          curl -sSL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TH_VERSION}/trufflehog_${TH_VERSION}_linux_amd64.tar.gz" \
            | tar -xz trufflehog
          sudo mv trufflehog /usr/local/bin/trufflehog
          trufflehog --version
          
          echo "Running TruffleHog (full repo history)…"
          # Exit codes: 0 = clean, 183 = findings, other != error
          status=0
          trufflehog git file://. --json --no-update > trufflehog-report.json || status=$?
          
          if [ "$status" -eq 183 ]; then
            echo "❌ TruffleHog found potential secrets."
            exit 1
          elif [ "$status" -ne 0 ]; then
            echo "❌ TruffleHog error (exit $status)."
            exit "$status"
          else
            echo "✅ TruffleHog: no findings."
          fi
        displayName: "Run TruffleHog (full history)"

      # Gitleaks (all refs) — fails on findings
      - script: |
          set -euo pipefail
          GL_VERSION="8.18.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          # use your repo config if present
          CFG_FLAG=""
          [ -f ".gitleaks.toml" ] && CFG_FLAG="--config .gitleaks.toml"
          gitleaks detect --source . --log-opts="--all" ${CFG_FLAG} \
            --redact --report-format json --report-path gitleaks-report.json --exit-code 1
        displayName: "Run Gitleaks (all refs)"

      # Publish reports regardless of pass/fail
      - task: CopyFiles@2
        displayName: "Collect secret scan reports"
        condition: always()
        inputs:
          contents: |
            trufflehog-report.json
            gitleaks-report.json
          targetFolder: "$(Build.ArtifactStagingDirectory)/secret-scan"

      - task: PublishBuildArtifacts@1
        displayName: "Publish Secret Scan Reports"
        condition: always()
        inputs:
          PathtoPublish: "$(Build.ArtifactStagingDirectory)/secret-scan"
          ArtifactName: "secret-scan-reports"
          publishLocation: "Container"

  - job: trivy_scan
    displayName: "Dependency scan (Trivy)"
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - script: |
          set -euo pipefail
          echo "##[section]Installing Trivy (latest)"
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

          echo ""
          echo "##[section]Scan targets"
          echo "pnpm package files:"
          find . -name "package.json" -not -path "*/node_modules/*" -maxdepth 3 | sed 's/^/  /'
          echo "Maven POMs:"
          find . -name "pom.xml" -not -path "*/target/*" | sed 's/^/  /'

          echo ""
          echo "##[section]Running Trivy (HIGH/CRITICAL, fixed only — no npm install required)"
          status=0
          trivy fs . \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs node_modules \
            --format table \
            --scanners vuln || status=$?

          echo ""
          echo "##[section]Saving JSON report"
          trivy fs . \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs node_modules \
            --format json \
            --output trivy-report.json \
            --scanners vuln 2>/dev/null || true

          if [ "$status" -ne 0 ]; then
            echo ""
            echo "##[error]Trivy found HIGH/CRITICAL vulnerabilities — build blocked before pnpm install."
            if [ -f trivy-report.json ]; then
              echo ""
              echo "##[section]Vulnerability summary"
              CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json)
              HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json)
              echo "  CRITICAL: ${CRITICAL}"
              echo "  HIGH:     ${HIGH}"
              echo ""
              echo "  Severity  CVE                  Package                  Installed  Fixed      Title"
              echo "  --------  -------------------  -----------------------  ---------  ---------  -----"
              jq -r '
                .Results[]? | .Target as $target |
                .Vulnerabilities[]? |
                "  \(.Severity)  \(.VulnerabilityID)  \(.PkgName)  \(.InstalledVersion // "?")  \(.FixedVersion // "no fix")  \(.Title // "")"
              ' trivy-report.json | sort || true
            fi
            exit "$status"
          fi

          echo "##[section]Result"
          echo "✅ Trivy: no HIGH/CRITICAL fixable vulnerabilities found."
        displayName: "Run Trivy (pnpm + Maven, no install required)"

      - script: |
          set -euo pipefail
          echo "##[section]Generating Trivy SARIF report"
          trivy fs . \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs node_modules \
            --format sarif \
            --output trivy-report.sarif \
            --scanners vuln
          echo "SARIF report written to trivy-report.sarif"
        displayName: "Generate Trivy SARIF report"
        condition: always()

      - task: CopyFiles@2
        displayName: "Collect Trivy reports"
        condition: always()
        inputs:
          contents: |
            trivy-report.json
            trivy-report.sarif
          targetFolder: "$(Build.ArtifactStagingDirectory)/trivy-scan"

      - task: PublishBuildArtifacts@1
        displayName: "Publish Trivy reports"
        condition: always()
        inputs:
          PathtoPublish: "$(Build.ArtifactStagingDirectory)/trivy-scan"
          ArtifactName: "trivy-scan-reports"
          publishLocation: "Container"

  - job: set_image_tag
    displayName: Set Image Tag
    steps:
      - script: |
          if [[ "$(Build.SourceBranch)" =~ refs/heads/(.+) ]]; then
            # Direct branch build
            postfix=""
          elif [[ "$(Build.SourceBranch)" =~ refs/pull/[0-9]+/merge ]]; then
            postfix="_${SYSTEM_PULLREQUEST_SOURCEBRANCH#refs/heads/}"
          elif [[ "$(Build.SourceBranch)" =~ refs/tags/(.+) ]]; then
            postfix="_${BASH_REMATCH[1]}"
          else
            postfix="_unknown"
          fi
          imageTag="$(Build.BuildNumber)$postfix"
          imageTag=${imageTag//\//-}
          imageTag=${imageTag//#/}
          echo "##vso[task.setvariable variable=imageTag]$imageTag"
          echo "$imageTag" > branchInfo.txt
        displayName: 'Set Image Tag and Save to File'

      - task: CopyFiles@2
        displayName: 'Copy branchInfo.txt to Artifacts Dir'
        inputs:
          contents: 'branchInfo.txt'
          targetFolder: '$(Build.ArtifactStagingDirectory)'

      - publish: $(Build.ArtifactStagingDirectory)
        displayName: Publish branchInfo.txt
        artifact: branchInfo

  - job: snomio_build_test_publish
    dependsOn:
      - set_image_tag
      - secrets_scan
      - trivy_scan
    displayName: Build, run integration test and publish
    timeoutInMinutes: 60
    pool:
      name: 'highmemory-pool'
    steps:

      # Download the branchInfo artifact
      - download: current
        artifact: branchInfo
        displayName: "Download branchInfo artifact"

      - script: |
          imageTag=$(cat $(Pipeline.Workspace)/branchInfo/branchInfo.txt)
          if [[ -z "$imageTag" || "$imageTag" == *unknown* ]]; then
            echo "Invalid imageTag: $imageTag"
            exit 1
          fi
          echo "##vso[task.setvariable variable=buildInfo]$imageTag"
          if [ "$(Build.SourceBranch)" = "refs/heads/main" ]; then
            imageTag="$imageTag,latest"
          fi
          echo "##vso[task.setvariable variable=imageTag]$imageTag"
          echo "Using imageTag: $imageTag"
        displayName: 'Read imageTag from branchInfo.txt'

      - task: MavenAuthenticate@0
        inputs:
          artifactsFeeds: '$(feedName)'

      - task: Docker@2
        displayName: 'Login to ACR'
        inputs:
          command: login
          containerRegistry: $(containerRegistry)

      - task: Docker@2
        displayName: 'Login to Quay.io'
        inputs:
          command: login
          containerRegistry: $(quayRegistry)

      - task: Cache@2
        displayName: Cache Maven local repo
        inputs:
          key: 'maven | "$(Agent.OS)" | **/pom.xml'
          restoreKeys: |
            maven | "$(Agent.OS)"
            maven
          path: $(mavenCache)

      - script: mkdir -p $(Pipeline.Workspace)/.pnpm-store
        displayName: 'Create pnpm store directory'

      - task: Cache@2
        displayName: Cache pnpm store
        inputs:
          key: 'pnpm | "$(Agent.OS)" | $(Build.SourcesDirectory)/ui/package.json'
          restoreKeys: |
            pnpm | "$(Agent.OS)"
          path: $(Pipeline.Workspace)/.pnpm-store
          cacheHitVar: CACHE_RESTORED

      - script: |
          echo "*** Create Maven Local Repo at $(mavenCache)"
          mkdir -p "$(mavenCache)"
          echo "##vso[task.setvariable variable=M2_HOME]/opt/maven"
          mkdir -p ~/.config/pnpm
          echo "store-dir=$(Pipeline.Workspace)/.pnpm-store" > ~/.config/pnpm/rc
        displayName: 'Create Maven Local Repo and set up M2_HOME'

      - task: Maven@3
        displayName: 'Build and run integration test'
        condition: not(and(succeeded(), eq(variables.isRelease, true)))
        inputs:
          mavenPomFile: 'pom.xml'
          options: '-Dsnomio.extensions.sergio.enabled=false -Dlingo.internal.users=$(imsUsername) -Ddocker.registry.host=$(dockerRegistry) -Ddocker.repository=$(dockerRepository) -Djib.to.tags=$(imageTag) -DargLine="-Dims-username=$(imsUsername) -Dims-password=$(imsPassword) -Dihtsdo.ims.api.url=$(imsApiUrl) -Dihtsdo.ims.api.cookie.name=$(imsCookieName)"'
          mavenOptions: '$(mavenOptions) -Xmx5072m -Dims-username=$(imsUsername) -Dims-password=$(imsPassword) -Dbuildnumber=$(buildInfo)'
          javaHomeOption: 'path'
          jdkUserInputPath: '/usr/lib/jvm/java-17-openjdk-amd64'
          jdkArchitectureOption: 'x64'
          publishJUnitResults: true
          testResultsFiles: '**/surefire-reports/TEST-*.xml'
          goals: 'package'

      - task: Maven@3
        condition: and(succeeded(), eq(variables.isRelease, true))
        displayName: 'Deploy Release artefacts'
        inputs:
          mavenPomFile: 'pom.xml'
          options: '-Dsnomio.extensions.sergio.enabled=false -Dlingo.internal.users=$(imsUsername) -Ddocker.registry.host=$(dockerRegistry) -Ddocker.repository=$(dockerRepository) -Djib.to.tags=$(imageTag) -DargLine="-Dims-username=$(imsUsername) -Dims-password=$(imsPassword) -Dihtsdo.ims.api.url=$(imsApiUrl) -Dihtsdo.ims.api.cookie.name=$(imsCookieName)"'
          mavenOptions: '$(mavenOptions) -Xmx5072m -Dims-username=$(imsUsername) -Dims-password=$(imsPassword) -Dbuildnumber=$(buildInfo)'
          javaHomeOption: 'path'
          jdkUserInputPath: '/usr/lib/jvm/java-17-openjdk-amd64'
          jdkArchitectureOption: 'x64'
          publishJUnitResults: true
          testResultsFiles: '**/surefire-reports/TEST-*.xml'
          goals: 'deploy'

      - script: |
          set -euo pipefail
          
          sudo apt-get update
          sudo apt-get install -y skopeo
          
          echo "Release build detected; copying image(s) from ACR to Quay..."
          echo "imageTag: $(imageTag)"
          
          # imageTag may contain multiple tags separated by commas (e.g. "snomio-...,latest")
          IFS=',' read -ra TAGS <<< "$(imageTag)"
          
          for tag in "${TAGS[@]}"; do
            tag="$(echo "$tag" | xargs)" # trim whitespace
            [ -z "$tag" ] && continue
          
            SRC="docker://$(dockerRegistry)/$(dockerRepository):${tag}"
            DEST="docker://quay.io/aehrc/lingo:${tag}"
          
            echo "Copying (multi-arch) ${SRC} -> ${DEST}"
            skopeo copy --all "${SRC}" "${DEST}"
          done
        displayName: 'Copy multi-arch image from ACR to Quay (release only)'
        condition: and(succeeded(), eq(variables.isRelease, true))

      - task: Maven@3
        condition: not(and(succeeded(), eq(variables.isRelease, true)))
        displayName: 'Deploy Build artefacts'
        inputs:
          mavenPomFile: 'pom.xml'
          mavenOptions: '$(mavenOptions)'
          javaHomeOption: 'path'
          jdkUserInputPath: '/usr/lib/jvm/java-17-openjdk-amd64'
          jdkArchitectureOption: 'x64'
          publishJUnitResults: false
          goals: 'deploy -pl .,common,auth'

      - task: PublishCodeCoverageResults@1
        condition: not(and(succeeded(), eq(variables.isRelease, true)))
        displayName: Publish Code Coverage
        inputs:
          enabled: true
          codeCoverageTool: 'JaCoCo'
          summaryFileLocation: '**/target/site/jacoco/jacoco.xml'
          reportDirectory: '**/target/site/jacoco'
          additionalCodeCoverageFiles: '**/target/jacoco.exec'


      - script: |
          set -e
          sudo apt-get install -y jq
          if ! command -v mvn &> /dev/null; then
          if [ -n "$M2_HOME" ]; then
            export PATH="$M2_HOME/bin:$PATH"
            echo "Added Maven from M2_HOME to PATH: $M2_HOME/bin"
          else
            echo "Maven not found and M2_HOME is not properly set. Please install Maven or set M2_HOME correctly."
            exit 1
            fi
          fi
          if ! command -v mvn &> /dev/null; then
            echo "Maven command still not found after adding M2_HOME to PATH. Check that the Maven binary exists at $M2_HOME/bin/mvn"
            exit 1
          fi
          ORGANIZATION=$(echo $SYSTEM_COLLECTIONURI | sed 's|https://dev.azure.com/\(.*\)/|\1|')
          echo "Organization: $ORGANIZATION"
          PROJECT=$SYSTEM_TEAMPROJECT
          echo "Project: $PROJECT"
          FEED=$FEED_NAME
          echo "Feed: $FEED"
          API_VERSION="7.1-preview.1"
          BASE_URL="https://pkgs.dev.azure.com/${ORGANIZATION}/${PROJECT}/_apis/packaging/feeds/${FEED}/maven/groups"
          if [ -z "$SYSTEM_ACCESSTOKEN" ]; then
            echo "SYSTEM_ACCESSTOKEN is not set. Enable 'Allow scripts to access the OAuth token' in the pipeline settings."
            exit 1
          fi
          promote_artifact() {
            local group_id=$1
            local artifact_id=$2
            local version=$3

            echo "Promoting ${group_id}:${artifact_id} version ${version}"

            # Promote the version to the Release view
            curl -s -X PATCH "${BASE_URL}/${group_id}/artifacts/${artifact_id}/versions/${version}?api-version=${API_VERSION}" \
              -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
              -H "Content-Type: application/json" \
              -d '{
                  "views":  {
                              "path":  "/views/-",
                              "op":  "add",
                              "value":  "Release"
                            }
                  }'

            echo "Promotion completed for ${group_id}:${artifact_id}:${version} "
          }
          POM_FILES=$(find . -name "pom.xml" -not -path "./target/*" -not -path "./*/target/*")
          for pom in $POM_FILES; do
            echo "Processing POM: $pom"
            GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout -f "$pom")
            ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout -f "$pom")
            VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -f "$pom")
            promote_artifact "$GROUP_ID" "$ARTIFACT_ID" "$VERSION"
          done
        displayName: 'Promote artifacts to Release view'
        condition: and(succeeded(), eq(variables.isRelease, true))
        env:
          SYSTEM_ACCESSTOKEN: $(System.AccessToken)
          SYSTEM_COLLECTIONURI: $(System.CollectionUri)
          SYSTEM_TEAMPROJECT: $(System.TeamProject)
          FEED_NAME: $(feedName)

