name: snomio-e2e-$(Date:yyyyMMdd)$(Rev:.r)_$(Build.SourceBranchName)

# On-demand only — run manually from Azure DevOps ("Run pipeline") or via the
# REST API. There is no CI/PR trigger.
trigger: none
pr: none

# The Cypress e2e suite drives a LIVE deployed environment (see
# ui/cypress/TESTING.md). By default that is the dev environment:
#
#   https://dev-snomio.ihtsdotools.org
#
# To target a different environment, set any of the following pipeline
# variables in Azure (queue-time variables or a linked variable group). Any
# value left unset/empty falls back to the dev default:
#
#   E2E_BASE_URL            URL the tests drive (Cypress baseUrl)
#   E2E_IMS_URL             IMS base URL
#   E2E_AP_URL              Authoring Platform URL
#   E2E_SNOWSTORM_URL       Snowstorm URL
#   E2E_AP_PROJECT_KEY      Authoring Platform project key
#   E2E_AP_DEFAULT_BRANCH   Authoring Platform default branch
#   E2E_SPECS               Spec glob passed to --spec (default: all specs)
#
# Required secrets (pipeline variables or a linked variable group):
#
#   imsUsername             IMS account the tests log in with
#   imsPassword             IMS account password (mark as secret)

pool:
  name: 'highmemory-pool'

jobs:
  - job: e2e_tests
    displayName: Run Cypress e2e tests against deployed environment
    timeoutInMinutes: 90
    variables:
      pnpmStore: $(Pipeline.Workspace)/.pnpm-store
      cypressCache: $(Pipeline.Workspace)/.cypress-cache
    steps:
      - checkout: self
        fetchDepth: 1

      - task: UseNode@1
        inputs:
          version: '20.x'
        displayName: 'Install Node.js 20'

      - task: Cache@2
        displayName: Cache pnpm store
        inputs:
          key: 'pnpm | "$(Agent.OS)" | $(Build.SourcesDirectory)/ui/pnpm-lock.yaml'
          restoreKeys: |
            pnpm | "$(Agent.OS)"
          path: $(pnpmStore)

      - task: Cache@2
        displayName: Cache Cypress binary
        inputs:
          key: 'cypress | "$(Agent.OS)" | $(Build.SourcesDirectory)/ui/pnpm-lock.yaml'
          restoreKeys: |
            cypress | "$(Agent.OS)"
          path: $(cypressCache)

      - script: |
          set -euo pipefail
          corepack enable
          mkdir -p ~/.config/pnpm
          echo "store-dir=$(pnpmStore)" > ~/.config/pnpm/rc
          cd ui
          pnpm install --frozen-lockfile
        displayName: 'Install UI dependencies (pnpm)'
        env:
          # Let corepack fetch the pnpm version pinned in ui/package.json
          # without an interactive prompt.
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
          CYPRESS_CACHE_FOLDER: $(cypressCache)

      - script: |
          set -euo pipefail
          cd ui

          # Defaults target the live dev environment; any E2E_* pipeline
          # variable set in Azure overrides the corresponding value
          # (":-" treats empty the same as unset).
          #
          # cypress_*/CYPRESS_* environment variables take precedence over
          # both cypress.env.json and the env block in cypress.config.ts —
          # do not rely on the (stale) values in cypress.env.json.
          export CYPRESS_BASE_URL="${E2E_BASE_URL:-https://dev-snomio.ihtsdotools.org}"
          export cypress_frontend_url="$CYPRESS_BASE_URL"
          export cypress_ims_url="${E2E_IMS_URL:-https://dev-ims.ihtsdotools.org}"
          export cypress_apUrl="${E2E_AP_URL:-https://dev-snowstorm.ihtsdotools.org}"
          export cypress_snowStormUrl="${E2E_SNOWSTORM_URL:-https://dev-snowstorm.ihtsdotools.org/snowstorm/snomed-ct}"
          export cypress_apProjectKey="${E2E_AP_PROJECT_KEY:-AUAMT}"
          export cypress_apDefaultBranch="${E2E_AP_DEFAULT_BRANCH:-MAIN/SNOMEDCT-AU/AUAMT}"
          export cypress_ims_username="$IMS_USERNAME"
          export cypress_ims_password="$IMS_PASSWORD"

          echo "Running e2e tests against $CYPRESS_BASE_URL"

          spec_args=()
          if [[ -n "${E2E_SPECS:-}" ]]; then
            spec_args=(--spec "$E2E_SPECS")
          fi

          # ${spec_args[@]+...} keeps "set -u" happy when the array is empty
          # on bash < 4.4 (possible on self-hosted agents).
          npx cypress run --browser electron --headless \
            --reporter junit \
            --reporter-options "mochaFile=cypress/results/results-[hash].xml,toConsole=false" \
            ${spec_args[@]+"${spec_args[@]}"}
        displayName: 'Run Cypress e2e tests'
        env:
          CYPRESS_CACHE_FOLDER: $(cypressCache)
          # Secret variables are not exported to scripts automatically —
          # map them in explicitly.
          IMS_USERNAME: $(imsUsername)
          IMS_PASSWORD: $(imsPassword)

      - task: PublishTestResults@2
        condition: succeededOrFailed()
        displayName: 'Publish test results'
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: 'ui/cypress/results/*.xml'
          testRunTitle: 'Cypress e2e ($(Build.SourceBranchName))'

      - task: PublishPipelineArtifact@1
        condition: failed()
        continueOnError: true
        displayName: 'Publish Cypress screenshots'
        inputs:
          targetPath: $(Build.SourcesDirectory)/ui/cypress/screenshots
          artifact: cypress-screenshots
          publishLocation: pipeline

      - task: PublishPipelineArtifact@1
        condition: failed()
        continueOnError: true
        displayName: 'Publish Cypress videos'
        inputs:
          targetPath: $(Build.SourcesDirectory)/ui/cypress/videos
          artifact: cypress-videos
          publishLocation: pipeline
